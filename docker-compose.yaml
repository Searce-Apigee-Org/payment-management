version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    container_name: app
    ports:
      - "80:8080"
    volumes:
      - ./:/app
    env_file:
      - ./.env
    networks:
      - app-network

  wiremock:
    image: wiremock/wiremock:latest
    container_name: wiremock
    ports:
      - '8080:8080'
    volumes:
      - ./mocks/wiremock/mappings:/home/wiremock/mappings
      - ./mocks/wiremock/__files:/home/wiremock/__files
    networks:
      - app-network
    command: ['--verbose']

  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
