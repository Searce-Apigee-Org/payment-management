services:
  payment-management:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    container_name: payment-management
    ports:
      - '8080:8080'
    depends_on:
      - localstack
      - mongo
      - wiremock
      - redis
    environment:
      - WIREMOCK_HOST=wiremock
      - WIREMOCK_PORT=8080
    volumes:
      - ./:/app
    env_file:
      - ./.env
    networks:
      - app-network

  mongo:
    image: mongo:latest
    container_name: fake-mongo-payment-management
    ports:
      - '27017:27017'
    networks:
      - app-network
    volumes:
      - ./data/mongodb:/data/db

  mongo-seed:
    image: mongo:latest
    container_name: fake-mongo-seed-payment-management
    depends_on:
      - mongo
    volumes:
      - './mocks/seeds:/seeds'
    entrypoint: ['bash', '/seeds/seedMongoDB.sh']
    networks:
      - app-network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express-payment-management
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo # host of the DB container
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin # optional auth
      ME_CONFIG_BASICAUTH_PASSWORD: adminpass
    ports:
      - '8082:8081' # UI available at http://localhost:8082
    networks:
      - app-network

  localstack:
    image: localstack/localstack
    container_name: localstack-payment-management
    ports:
      - '4566:4566'
      - '4510-4559:4510-4559'
    environment:
      - SERVICES=dynamodb
      - DEFAULT_REGION=us-east-1
      - EDGE_PORT=4566
      - AWS_ACCESS_KEY_ID=dummy-access-key-id
      - AWS_SECRET_ACCESS_KEY=dummy-secret-access-key
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - './localstack_data:/var/lib/localstack'
      - './mocks/seeds:/seeds'

    networks:
      - app-network

  wiremock:
    image: wiremock/wiremock:latest
    container_name: wiremock-payment-management
    volumes:
      - ./mocks/wiremock/mappings:/home/wiremock/mappings
      - ./mocks/wiremock/__files:/home/wiremock/__files
    networks:
      - app-network
    command: ['--verbose']

  redis:
    image: docker.io/redis:latest
    container_name: redis-payment-management
    ports:
      - '6379:6379'
    volumes:
      - ./data/redis:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
